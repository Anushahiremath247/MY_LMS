services:
  - type: web
    runtime: node
    name: lazy-learning-frontend
    rootDir: frontend
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    autoDeployTrigger: commit
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false

  - type: web
    runtime: node
    name: lazy-learning-api
    rootDir: backend
    plan: free
    buildCommand: npm install && npm run prisma:generate && npm run build
    preDeployCommand: npx prisma db push
    startCommand: npm run start
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: lazy-learning-db
          property: connectionString
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: CLIENT_URL
        sync: false
      - key: SERVER_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_DAYS
        value: 30
      - key: COOKIE_DOMAIN
        sync: false
      - key: HUGGINGFACE_API_KEY
        sync: false

databases:
  - name: lazy-learning-db
    plan: basic-256mb
